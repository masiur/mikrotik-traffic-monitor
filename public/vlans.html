<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Monitor — VLANs</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0e17; --surface: #111827; --border: #1e293b;
            --text: #e0e0e0; --text-heading: #f1f5f9; --text-muted: #64748b;
            --text-subtle: #475569; --text-nav: #94a3b8; --grid: #1e293b;
            --status-bg: #1e293b; --status-text: #94a3b8;
            --running-bg: #064e3b; --running-text: #34d399;
            --down-bg: #450a0a; --down-text: #f87171;
            --error-bg: #450a0a; --error-border: #7f1d1d; --error-text: #fca5a5;
            --nav-hover-bg: #1e293b; --nav-hover-text: #e2e8f0;
        }
        :root[data-theme="light"] {
            --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
            --text: #1e293b; --text-heading: #0f172a; --text-muted: #64748b;
            --text-subtle: #94a3b8; --text-nav: #475569; --grid: #e2e8f0;
            --status-bg: #e2e8f0; --status-text: #475569;
            --running-bg: #d1fae5; --running-text: #065f46;
            --down-bg: #fee2e2; --down-text: #991b1b;
            --error-bg: #fee2e2; --error-border: #fca5a5; --error-text: #991b1b;
            --nav-hover-bg: #e2e8f0; --nav-hover-text: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { height: 32px; display: none; }
        .header-logo.visible { display: block; }
        .header h1 { font-size: 20px; font-weight: 600; color: var(--text-heading); }
        nav { display: flex; gap: 4px; margin-left: 12px; }
        nav a {
            font-size: 13px; padding: 6px 14px; border-radius: 6px;
            text-decoration: none; color: var(--text-nav); transition: all 0.2s;
        }
        nav a:hover { background: var(--nav-hover-bg); color: var(--nav-hover-text); }
        nav a.active { background: #3b82f6; color: #fff; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .theme-toggle {
            background: var(--border); border: none; color: var(--text-nav);
            width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s;
        }
        .theme-toggle:hover { background: var(--nav-hover-bg); color: var(--text-heading); }
        .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-nav); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ef4444; transition: background 0.3s;
        }
        .status-dot.connected { background: #22c55e; }
        .container { padding: 20px 24px; }
        .perspective-note {
            font-size: 12px; color: var(--text-muted); margin-bottom: 16px;
            padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; display: inline-block;
        }
        .summary-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .summary-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
        }
        .summary-card .label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); margin-bottom: 6px;
        }
        .summary-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .speed-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .speed-row svg { flex-shrink: 0; }
        .speed-row .speed-val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .dl { color: #22c55e; }
        .ul { color: #94a3b8; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
        .chart-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-title { font-size: 15px; font-weight: 600; color: var(--text-heading); }
        .chart-live { display: flex; gap: 16px; font-size: 13px; font-variant-numeric: tabular-nums; }
        .chart-live-item { display: flex; align-items: center; gap: 4px; }
        .iface-status {
            font-size: 11px; padding: 2px 8px; border-radius: 4px;
            background: var(--status-bg); color: var(--status-text);
        }
        .iface-status.running { background: var(--running-bg); color: var(--running-text); }
        .iface-status.down { background: var(--down-bg); color: var(--down-text); }
        canvas { max-height: 200px; }
        .error-banner {
            background: var(--error-bg); border: 1px solid var(--error-border);
            color: var(--error-text); padding: 12px 16px; border-radius: 8px;
            margin-bottom: 16px; display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img class="header-logo" id="appLogo" src="" alt="Logo">
            <h1 id="appTitle">Traffic Monitor</h1>
            <nav>
                <a href="/">WAN</a>
                <a href="/vlans" class="active">VLANs</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
        </div>
    </div>
    <div class="container">
        <div class="error-banner" id="errorBanner"></div>
        <div class="perspective-note">Showing from user/admin perspective — Download = traffic going to users, Upload = traffic from users</div>
        <div class="summary-row" id="summaryRow"></div>
        <div class="chart-grid" id="chartGrid"></div>
    </div>

    <script>
        // Theme
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        const themeBtn = document.getElementById('themeToggle');
        function updateThemeIcon() {
            const t = document.documentElement.getAttribute('data-theme');
            themeBtn.textContent = t === 'dark' ? '\u2600' : '\u263E';
        }
        updateThemeIcon();
        themeBtn.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon();
            Object.values(charts).forEach(c => {
                const gc = next === 'dark' ? '#1e293b' : '#e2e8f0';
                const tc = next === 'dark' ? '#475569' : '#94a3b8';
                const lc = next === 'dark' ? '#94a3b8' : '#475569';
                c.options.scales.x.grid.color = gc;
                c.options.scales.y.grid.color = gc;
                c.options.scales.x.ticks.color = tc;
                c.options.scales.y.ticks.color = tc;
                c.options.plugins.legend.labels.color = lc;
                c.update('none');
            });
        });

        const MAX_POINTS = 120;
        const charts = {};
        let vlanInterfaces = [];

        const DL_COLOR = '#22c55e';
        const UL_COLOR = '#94a3b8';
        const DL_ICON = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v9m0 0L4.5 7.5M8 11l3.5-3.5" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/></svg>';
        const UL_ICON = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 14V5m0 0L4.5 8.5M8 5l3.5 3.5" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3h10" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/></svg>';

        function formatSpeed(mbps) {
            if (mbps >= 1000) return (mbps / 1000).toFixed(2) + ' Gbps';
            if (mbps >= 1) return mbps.toFixed(2) + ' Mbps';
            return (mbps * 1000).toFixed(1) + ' Kbps';
        }
        function formatBytes(bytes) {
            if (bytes >= 1e12) return (bytes / 1e12).toFixed(2) + ' TB';
            if (bytes >= 1e9) return (bytes / 1e9).toFixed(2) + ' GB';
            if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
            return (bytes / 1e3).toFixed(0) + ' KB';
        }

        function chartColors() {
            const t = document.documentElement.getAttribute('data-theme');
            return {
                grid: t === 'dark' ? '#1e293b' : '#e2e8f0',
                tick: t === 'dark' ? '#475569' : '#94a3b8',
                legend: t === 'dark' ? '#94a3b8' : '#475569',
            };
        }

        // VLAN perspective swap:
        // Router TX → user Download (traffic going TO users)
        // Router RX → user Upload (traffic coming FROM users)

        function initUI(ifaces) {
            vlanInterfaces = ifaces;
            const summaryRow = document.getElementById('summaryRow');
            const chartGrid = document.getElementById('chartGrid');

            summaryRow.innerHTML = `
                <div class="summary-card">
                    <div class="label">Total Download</div>
                    <div class="speed-row">${DL_ICON}<span class="speed-val dl" id="totalDl">0 Kbps</span></div>
                    <div class="sub" id="totalDlBytes">0 KB</div>
                </div>
                <div class="summary-card">
                    <div class="label">Total Upload</div>
                    <div class="speed-row">${UL_ICON}<span class="speed-val ul" id="totalUl">0 Kbps</span></div>
                    <div class="sub" id="totalUlBytes">0 KB</div>
                </div>
            `;

            vlanInterfaces.forEach(iface => {
                summaryRow.innerHTML += `
                    <div class="summary-card">
                        <div class="label">${iface}</div>
                        <div class="speed-row">${DL_ICON}<span class="speed-val dl" id="speed-dl-${iface}">0 Kbps</span></div>
                        <div class="speed-row">${UL_ICON}<span class="speed-val ul" id="speed-ul-${iface}">0 Kbps</span></div>
                        <div class="sub"><span class="iface-status" id="status-${iface}">--</span></div>
                    </div>
                `;
                chartGrid.innerHTML += `
                    <div class="chart-card">
                        <div class="chart-header">
                            <span class="chart-title">${iface}</span>
                            <div class="chart-live">
                                <span class="chart-live-item dl">${DL_ICON}&nbsp;<span id="live-dl-${iface}">0</span></span>
                                <span class="chart-live-item ul">${UL_ICON}&nbsp;<span id="live-ul-${iface}">0</span></span>
                            </div>
                        </div>
                        <canvas id="chart-${iface}"></canvas>
                    </div>
                `;
            });

            const cc = chartColors();
            vlanInterfaces.forEach(iface => {
                const ctx = document.getElementById(`chart-${iface}`).getContext('2d');
                charts[iface] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [
                            { label: 'Download', data: [], borderColor: DL_COLOR, backgroundColor: DL_COLOR + '30', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2.5 },
                            { label: 'Upload', data: [], borderColor: UL_COLOR, backgroundColor: UL_COLOR + '15', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1 },
                        ],
                    },
                    options: {
                        responsive: true, maintainAspectRatio: true,
                        animation: { duration: 0 },
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: { display: true, grid: { color: cc.grid }, ticks: { color: cc.tick, maxTicksLimit: 10, font: { size: 10 } } },
                            y: { display: true, beginAtZero: true, grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 }, callback: v => formatSpeed(v) } },
                        },
                        plugins: {
                            legend: { display: true, labels: { color: cc.legend, boxWidth: 12, font: { size: 11 } } },
                            tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + formatSpeed(ctx.raw) } },
                        },
                    },
                });
            });
        }

        async function boot() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('appTitle').textContent = config.appTitle;
            document.title = config.appTitle + ' — VLANs';
            if (config.appLogo) {
                const logo = document.getElementById('appLogo');
                logo.src = config.appLogo;
                logo.classList.add('visible');
            }
            initUI(config.vlanInterfaces);

            const socket = io();
            socket.on('connect', () => { socket.emit('start_monitor'); });
            socket.on('connected', (data) => {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = `${data.routerName} @ ${data.host}`;
            });

            socket.on('vlan_traffic', (data) => {
                const speeds = data.speeds;
                const label = new Date(data.timestamp * 1000).toLocaleTimeString();

                // Swapped perspective: TX = user download, RX = user upload
                let totalDl = 0, totalUl = 0, totalDlBytes = 0, totalUlBytes = 0;

                vlanInterfaces.forEach(iface => {
                    if (!speeds[iface]) return;
                    const s = speeds[iface];

                    // TX (router sending) = Download (user receiving)
                    // RX (router receiving) = Upload (user sending)
                    const dlMbps = s.txMbps;
                    const ulMbps = s.rxMbps;
                    const dlBytes = s.txBytesTotal;
                    const ulBytes = s.rxBytesTotal;

                    totalDl += dlMbps; totalUl += ulMbps;
                    totalDlBytes += dlBytes; totalUlBytes += ulBytes;

                    const dlEl = document.getElementById(`speed-dl-${iface}`);
                    const ulEl = document.getElementById(`speed-ul-${iface}`);
                    if (dlEl) dlEl.textContent = formatSpeed(dlMbps);
                    if (ulEl) ulEl.textContent = formatSpeed(ulMbps);
                    const liveDl = document.getElementById(`live-dl-${iface}`);
                    const liveUl = document.getElementById(`live-ul-${iface}`);
                    if (liveDl) liveDl.textContent = formatSpeed(dlMbps);
                    if (liveUl) liveUl.textContent = formatSpeed(ulMbps);

                    const statusEl = document.getElementById(`status-${iface}`);
                    if (statusEl) {
                        if (s.disabled) { statusEl.textContent = 'DISABLED'; statusEl.className = 'iface-status down'; }
                        else if (s.running) { statusEl.textContent = 'RUNNING'; statusEl.className = 'iface-status running'; }
                        else { statusEl.textContent = 'DOWN'; statusEl.className = 'iface-status down'; }
                    }

                    const chart = charts[iface];
                    if (chart) {
                        chart.data.labels.push(label);
                        chart.data.datasets[0].data.push(dlMbps);
                        chart.data.datasets[1].data.push(ulMbps);
                        if (chart.data.labels.length > MAX_POINTS) {
                            chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift();
                        }
                        chart.update('none');
                    }
                });

                document.getElementById('totalDl').textContent = formatSpeed(totalDl);
                document.getElementById('totalUl').textContent = formatSpeed(totalUl);
                document.getElementById('totalDlBytes').textContent = formatBytes(totalDlBytes) + ' total';
                document.getElementById('totalUlBytes').textContent = formatBytes(totalUlBytes) + ' total';
            });

            socket.on('error', (data) => {
                document.getElementById('errorBanner').textContent = data.message;
                document.getElementById('errorBanner').style.display = 'block';
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Disconnected';
            });
            socket.on('status', (data) => {
                document.getElementById('statusText').textContent = data.message;
                document.getElementById('statusDot').classList.remove('connected');
            });
        }
        boot();
    </script>
</body>
</html>
